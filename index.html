  <title>Milagroso Stereo — Radio Católica 24/7</title>

  <!-- Google Fonts -->

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Cormorant+Garamond:ital,wght@1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ===========================
       CSS CUSTOM PROPERTIES
       =========================== */
    :root {
      /* Colores */
      --color-crimson-deep:  #1A0404;
      --color-crimson:       #7A0808;
      --color-crimson-mid:   #A91B1B;
      --color-gold:          #C9922A;
      --color-gold-light:    #E8B84B;
      --color-cream:         #FAF7F2;
      --color-cream-mid:     #F0EBE1;
      --color-text:          #1A0404;
      --color-text-muted:    #6B4040;
      --color-success:       #4CAF50;
      --color-overlay:       rgba(26, 4, 4, 0.85);

      /* Tipografía */
      --font-heading:  'Playfair Display', Georgia, serif;
      --font-quote:    'Cormorant Garamond', Georgia, serif;
      --font-body:     'Inter', system-ui, sans-serif;

      /* Espaciado (8px grid) */
      --sp-1: 8px;
      --sp-2: 16px;
      --sp-3: 24px;
      --sp-4: 32px;
      --sp-5: 40px;
      --sp-6: 48px;
      --sp-8: 64px;
      --sp-10: 80px;

      /* Bordes */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;
      --radius-pill: 9999px;

      /* Sombras */
      --shadow-sm: 0 1px 3px rgba(26,4,4,0.12);
      --shadow-md: 0 4px 16px rgba(26,4,4,0.18);
      --shadow-lg: 0 8px 32px rgba(26,4,4,0.24);

      /* Transiciones */
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);

      /* Nav */
      --nav-height: 64px;
    }

    /* ===========================
       RESET & BASE
       =========================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-cream);
      line-height: 1.6;
      overflow-x: hidden;
    }

    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
    ul, ol { list-style: none; }

    /* Skip link accesibilidad */
    .skip-link {
      position: absolute;
      top: -100%;
      left: var(--sp-2);
      background: var(--color-gold);
      color: var(--color-crimson-deep);
      padding: var(--sp-1) var(--sp-2);
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.875rem;
      z-index: 9999;
      transition: top var(--transition-fast);
    }
    .skip-link:focus { top: var(--sp-1); }

    /* Focus ring global */
    :focus-visible {
      outline: 2px solid var(--color-gold);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }

    /* Reducir movimiento */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

    /* Sección base */
    .section {
      padding: var(--sp-10) var(--sp-4);
    }
    .section--dark {
      background: var(--color-crimson-deep);
      color: var(--color-cream);
    }
    .section--mid {
      background: var(--color-cream-mid);
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .section-label {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-gold);
      margin-bottom: var(--sp-2);
    }
    .section-title {
      font-family: var(--font-heading);
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      line-height: 1.2;
      margin-bottom: var(--sp-3);
    }
    .section-title--light { color: var(--color-cream); }
    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--color-gold), var(--color-gold-light));
      border-radius: var(--radius-pill);
      margin-bottom: var(--sp-5);
    }
  </style>
</head>
