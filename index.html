  <style>
    /* ===========================
       CSS CUSTOM PROPERTIES
       =========================== */
    :root {
      /* Colores */
      --color-crimson-deep:  #1A0404;
      --color-crimson:       #7A0808;
      --color-crimson-mid:   #A91B1B;
      --color-gold:          #C9922A;
      --color-gold-light:    #E8B84B;
      --color-cream:         #FAF7F2;
      --color-cream-mid:     #F0EBE1;
      --color-text:          #1A0404;
      --color-text-muted:    #6B4040;
      --color-success:       #4CAF50;
      --color-error:         #DC2626;
      --color-overlay:       rgba(26, 4, 4, 0.85);

      /* Tipografía */
      --font-heading:  'Playfair Display', Georgia, serif;
      --font-quote:    'Cormorant Garamond', Georgia, serif;
      --font-body:     'Inter', system-ui, sans-serif;

      /* Espaciado (8px grid) */
      --sp-1: 8px;
      --sp-2: 16px;
      --sp-3: 24px;
      --sp-4: 32px;
      --sp-5: 40px;
      --sp-6: 48px;
      --sp-8: 64px;
      --sp-10: 80px;

      /* Bordes */
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 16px;
      --radius-pill: 9999px;

      /* Sombras */
      --shadow-sm: 0 1px 3px rgba(26,4,4,0.12);
      --shadow-md: 0 4px 16px rgba(26,4,4,0.18);
      --shadow-lg: 0 8px 32px rgba(26,4,4,0.24);

      /* Transiciones */
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-slow: 400ms cubic-bezier(0.4, 0, 0.2, 1);

      /* Nav */
      --nav-height: 64px;
    }

    /* ===========================
       RESET & BASE
       =========================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-cream);
      line-height: 1.6;
      overflow-x: hidden;
    }

    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; }
    ul, ol { list-style: none; }

    /* Skip link accesibilidad */
    .skip-link {
      position: absolute;
      top: -3rem;
      left: var(--sp-2);
      background: var(--color-gold);
      color: var(--color-crimson-deep);
      padding: var(--sp-1) var(--sp-2);
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.875rem;
      z-index: 9999;
      transition: top var(--transition-fast);
    }
    .skip-link:focus { top: var(--sp-1); }

    /* Focus ring global */
    :focus-visible {
      outline: 2px solid var(--color-gold);
      outline-offset: 3px;
      border-radius: var(--radius-sm);
    }

    /* Reducir movimiento */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      html { scroll-behavior: auto; }
    }

    /* Sección base */
    .section {
      padding: var(--sp-10) var(--sp-4);
    }
    .section--dark {
      background: var(--color-crimson-deep);
      color: var(--color-cream);
    }
    .section--mid {
      background: var(--color-cream-mid);
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
    }
    .section-label {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-gold);
      margin-bottom: var(--sp-2);
    }
    .section-title {
      font-family: var(--font-heading);
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      line-height: 1.2;
      margin-bottom: var(--sp-3);
    }
    .section-title--light { color: var(--color-cream); }
    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, var(--color-gold), var(--color-gold-light));
      border-radius: var(--radius-pill);
      margin-bottom: var(--sp-5);
    }
    /* ===========================
       NAVIGATION
       =========================== */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-height);
      background: var(--color-crimson-deep);
      border-bottom: 1px solid rgba(201,146,42,0.2);
      z-index: 1000;
      box-shadow: var(--shadow-md);
    }
    .nav__inner {
      height: 100%;
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      padding: 0 var(--sp-3);
    }

    /* Logo */
    .nav__logo {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      flex-shrink: 0;
      text-decoration: none;
    }
    .nav__logo-cross {
      font-size: 1.25rem;
      color: var(--color-gold);
      line-height: 1;
    }
    .nav__logo-text {
      font-family: var(--font-heading);
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--color-cream);
      line-height: 1.2;
      letter-spacing: 0.02em;
    }
    .nav__logo-text em {
      font-style: italic;
      color: var(--color-gold-light);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
    }

    /* Links */
    .nav__links {
      display: none;
      gap: var(--sp-4);
      flex: 1;
      justify-content: center;
    }
    @media (min-width: 768px) {
      .nav__links { display: flex; }
    }
    .nav__link {
      font-size: 0.875rem;
      font-weight: 500;
      color: rgba(250,247,242,0.75);
      transition: color var(--transition-fast);
      padding: var(--sp-1) 0;
      position: relative;
    }
    .nav__link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 1px;
      background: var(--color-gold);
      transform: scaleX(0);
      transition: transform var(--transition-base);
    }
    .nav__link:hover { color: var(--color-cream); }
    .nav__link:hover::after { transform: scaleX(1); }

    /* Pill player */
    .nav__player {
      display: flex;
      align-items: center;
      gap: var(--sp-1);
      background: rgba(201,146,42,0.12);
      border: 1px solid rgba(201,146,42,0.35);
      border-radius: var(--radius-pill);
      padding: 6px var(--sp-2);
      flex-shrink: 0;
      transition: background var(--transition-fast);
    }
    .nav__player:hover { background: rgba(201,146,42,0.2); }
    .nav__player-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #888;
      transition: background var(--transition-base);
      flex-shrink: 0;
    }
    .nav__player-dot.is-live {
      background: var(--color-success);
      box-shadow: 0 0 6px var(--color-success);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .nav__player-btn {
      background: none;
      border: none;
      color: var(--color-cream);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px; height: 20px;
      padding: 0;
      transition: color var(--transition-fast);
    }
    .nav__player-btn:hover { color: var(--color-gold); }
    .nav__player-label {
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--color-gold);
    }

    /* Social links */
    .nav__social {
      display: none;
      gap: var(--sp-2);
    }
    @media (min-width: 1024px) {
      .nav__social { display: flex; }
    }
    .nav__social-link {
      color: rgba(250,247,242,0.6);
      display: flex;
      align-items: center;
      transition: color var(--transition-fast);
    }
    .nav__social-link:hover { color: var(--color-gold); }

    /* Hamburger */
    .nav__hamburger {
      background: none;
      border: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: var(--sp-1);
      margin-left: auto;
    }
    @media (min-width: 768px) {
      .nav__hamburger { display: none; }
    }
    .nav__hamburger-bar {
      display: block;
      width: 22px; height: 2px;
      background: var(--color-cream);
      border-radius: 1px;
      transition: transform var(--transition-base), opacity var(--transition-base);
    }
    .nav__hamburger[aria-expanded="true"] .nav__hamburger-bar:nth-child(1) {
      transform: translateY(7px) rotate(45deg);
    }
    .nav__hamburger[aria-expanded="true"] .nav__hamburger-bar:nth-child(2) {
      opacity: 0;
    }
    .nav__hamburger[aria-expanded="true"] .nav__hamburger-bar:nth-child(3) {
      transform: translateY(-7px) rotate(-45deg);
    }

    /* Mobile menu */
    .nav__mobile {
      display: flex;
      flex-direction: column;
      background: var(--color-crimson-deep);
      border-top: 1px solid rgba(201,146,42,0.2);
      max-height: 0;
      overflow: hidden;
      visibility: hidden;
      transition: max-height var(--transition-slow), visibility var(--transition-slow);
    }
    .nav__mobile.is-open {
      max-height: 80vh;
      visibility: visible;
    }
    .nav__mobile-link {
      padding: var(--sp-2) var(--sp-3);
      font-size: 1rem;
      color: rgba(250,247,242,0.85);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    .nav__mobile-link:hover {
      background: rgba(201,146,42,0.1);
      color: var(--color-cream);
    }

    /* Offset content below fixed nav */
    main { padding-top: var(--nav-height); }
  </style>
</head>
